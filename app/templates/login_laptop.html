<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../static/css/style_login_page.css">
    <!-- шрифт  Press Start 2P-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

<div class="wrapper">
  <div class="card">

    <div class="card-header">
      <div class="icon-box"><img class="image" src="../static/images/cosmetics/egg.png" alt="Tamagochi egg illustration" /></div>
      <h2>LOGIN</h2>
      <p>Log in to continue</p>
    </div>

    <form id="loginForm">

      <div class="input-group">
        <label for="name">UserName or Gmail</label>
        <input type="text" id="name" placeholder="put here" required>
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>

      <div class="member-group">
        <p class = 'question'>Not a member?</p>
        <button type="button" class = 'first_button'>Sign Up</button>
      </div>

      <button type="submit" class = 'second_button'>Continue</button>

    </form>

  </div>
</div>

</body>
</html>
