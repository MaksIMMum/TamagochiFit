<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hatch Your Pet - TamagochiFit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
  <script src="/static/js/auth.js"></script>
  <link rel="stylesheet" href="../static/css/hatch.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <!-- Stage 1: Egg Clicking -->
      <div class="stage egg-stage" id="eggStage">
        <h1>Your Egg is Ready!</h1>
        <p>Click on the egg to help it hatch ✨</p>
        <div class="egg-wrapper">
          <img id="eggImage" src="/static/images/characters/main_egg.png" alt="Egg">
        </div>
        <p class="click-prompt">👆 Click me!</p>
        <div class="click-count" id="clickCount">0 / 5 clicks</div>
      </div>

      <!-- Stage 2: Hatching Animation -->
      <!-- Stage 2: Hatching Animation -->
      <div class="stage hatching-stage hidden" id="hatchingStage">
        <div class="celebration">🎉</div>
        <h2>It's Hatching!</h2>
        <p>Your companion is being born...</p>
        <img id="characterReveal" src="" alt="Character" class="character-reveal" style="object-fit: contain;">
        <div class="celebration">✨</div>
      </div>
      <!-- Stage 3: Name Your Pet -->
      <div class="stage name-stage hidden" id="nameStage">
        <h2>Meet Your New Friend!</h2>
        <p>Give your companion a name to begin your journey together</p>

        <form id="nameForm">
          <div class="form-group">
            <label for="petName">Choose a Name</label>
            <input
              type="text"
              id="petName"
              placeholder="e.g., Buddy"
              minlength="1"
              maxlength="20"
              required
            >
          </div>
          <div class="error-message" id="nameError"></div>
          <button type="submit" class="submit-btn" id="submitBtn">
            Start Journey!
          </button>
        </form>
      </div>
    </div>
  </div>

  <script src="../static/js/hatch.js"></script>
</body>
</html>
