<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard - TamagochiFit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
  <script src="/static/js/auth.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #eae6f0;
      --surface: #f2f0f7;
      --card: #e8e2f5;
      --purple: #7b55b8;
      --purple-dark: #5b2dd6;
      --purple-light: #a070e0;
      --text: #2a1a50;
      --muted: #a898cc;
      --accent: #ffd93d;
      --pink: #e05c7a;
      --gold: #ffd700;
      --silver: #c0c0c0;
      --bronze: #cd7f32;
    }

    body {
      font-family: 'Pixelify Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .pixel-bar {
      display: block;
      height: 8px;
      width: 100%;
      background-image: repeating-linear-gradient(
        90deg,
        var(--purple-dark)  0px,  var(--purple-dark)  10px,
        var(--purple-light) 10px, var(--purple-light) 20px,
        var(--accent)       20px, var(--accent)       28px,
        #fff8e1             28px, #fff8e1             36px,
        var(--pink)         36px, var(--pink)         44px,
        var(--purple-light) 44px, var(--purple-light) 54px
      );
      background-size: 54px 100%;
    }

    .navbar {
      background: var(--surface);
      border-bottom: 3px solid var(--card);
      padding: 15px 30px;
      box-shadow: 0 2px 10px rgba(123,85,184,0.08);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-content {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-logo {
      font-family: 'Press Start 2P', cursive;
      font-size: 18px;
      color: var(--text);
      text-decoration: none;
    }
    .nav-logo span { color: var(--purple); }
    .nav-links { display: flex; gap: 8px; list-style: none; }
    .nav-links a {
      display: flex; align-items: center; gap: 6px; padding: 10px 18px;
      border-radius: 12px; text-decoration: none; font-size: 14px;
      font-weight: 600; color: var(--muted); transition: all 0.2s ease;
    }
    .nav-links a:hover { background: var(--card); color: var(--text); }
    .nav-links a.active { background: var(--purple); color: white; }
    .nav-user { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 600; color: var(--text); }
    .nav-avatar {
      width: 36px; height: 36px; background: var(--purple); border-radius: 50%;
      display: flex; align-items: center; justify-content: center; color: white; font-weight: 700;
    }

    .main-content {
      flex: 1;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .page-header { text-align: center; margin-bottom: 40px; }
    .page-title {
      font-family: 'Press Start 2P', cursive;
      font-size: 32px;
      color: var(--text);
      margin-bottom: 15px;
      text-shadow: 2px 2px 0 var(--card);
    }
    .page-subtitle { font-size: 18px; color: var(--muted); font-weight: 600; }

    .leaderboard-card {
      background: white;
      border-radius: 25px;
      border: 4px solid var(--card);
      box-shadow: 0 10px 30px rgba(123,85,184,0.15);
      overflow: hidden;
    }

    .leaderboard-table {
      width: 100%;
      border-collapse: collapse;
    }

    .leaderboard-table th {
      background: var(--surface);
      padding: 20px;
      font-family: 'Press Start 2P', cursive;
      font-size: 12px;
      color: var(--purple-dark);
      text-align: left;
      border-bottom: 3px solid var(--card);
    }

    .leaderboard-table th.center { text-align: center; }

    .leaderboard-table td {
      padding: 18px 20px;
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      border-bottom: 2px solid var(--card);
      vertical-align: middle;
    }

    .leaderboard-row { transition: background 0.2s; }
    .leaderboard-row:hover { background: #faf9fd; }
    .leaderboard-row:last-child td { border-bottom: none; }

    .rank-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-family: 'Press Start 2P', cursive;
      font-size: 12px;
      color: white;
      background: var(--muted);
    }

    .rank-1 .rank-badge { background: var(--gold); box-shadow: 0 0 15px rgba(255,215,0,0.5); transform: scale(1.1); }
    .rank-2 .rank-badge { background: var(--silver); }
    .rank-3 .rank-badge { background: var(--bronze); }

    .user-info { display: flex; align-items: center; gap: 15px; }
    .user-avatar {
      width: 45px; height: 45px;
      border-radius: 12px;
      background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      border: 2px solid var(--card);
    }

    .stat-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 12px;
      background: var(--surface);
      font-weight: 700;
      font-size: 14px;
    }
    .stat-pill.xp { color: var(--purple-dark); background: #f3eefe; }
    .stat-pill.streak { color: #d94a26; background: #feeee9; }

    .loading-state, .error-state {
      text-align: center;
      padding: 60px 20px;
      font-size: 18px;
      font-weight: 600;
      color: var(--muted);
    }
    .error-state { color: var(--pink); }

    @media (max-width: 768px) {
      .nav-links { display: none; }
      .leaderboard-table th:nth-child(4),
      .leaderboard-table td:nth-child(4) { display: none; } /* Hide streak on mobile */
    }
  </style>
</head>
<body>

  <div class="pixel-bar"></div>

  <nav class="navbar">
    <div class="nav-content">
      <a href="/" class="nav-logo">🥚 Tamagoochi<span>Fit</span></a>
      <ul class="nav-links">
        <li><a href="/home">🏠 Home</a></li>
        <li><a href="/workouts">💪 Workouts</a></li>
        <li><a href="/meals">🍽️ Meals</a></li>
        <li><a href="/shop">🛒 Shop</a></li>
        <li><a href="/leaderboard" class="active">🏆 Leaderboard</a></li>
        <li><a href="/profile">👤 Profile</a></li>
      </ul>
      <div class="nav-user">
        <div class="nav-avatar" id="userAvatar">U</div>
        <span id="userName">User</span>
      </div>
    </div>
  </nav>

  <div class="main-content">
    <div class="page-header">
      <h1 class="page-title">Hall of Fame</h1>
      <p class="page-subtitle">The most dedicated trainers and their pets.</p>
    </div>

    <div class="leaderboard-card">
      <table class="leaderboard-table">
        <thead>
          <tr>
            <th class="center" width="80">Rank</th>
            <th>Trainer & Pet</th>
            <th class="center">Pet Level</th>
            <th class="center">XP / Score</th>
          </tr>
        </thead>
        <tbody id="leaderboardBody">
          <tr>
            <td colspan="4">
              <div class="loading-state">⏳ Loading rankings...</div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('access_token');

    async function loadUserInfo() {
      try {
        const response = await fetch('/api/auth/me', {
          headers: token ? { 'Authorization': `Bearer ${token}` } : {}
        });
        if (response.ok) {
          const user = await response.json();
          document.getElementById('userName').textContent = user.username;
          document.getElementById('userAvatar').textContent = user.username.charAt(0).toUpperCase();
        }
      } catch(e) {
        console.error('Failed to load user info', e);
      }
    }

    async function loadLeaderboard() {
      const tbody = document.getElementById('leaderboardBody');
      try {
        const response = await fetch('/api/social/leaderboard', {
          headers: token ? { 'Authorization': `Bearer ${token}` } : {}
        });

        if (!response.ok) throw new Error('Failed to fetch leaderboard data.');

        const result = await response.json();

        // Extract the entries array from the response object
        const entries = result.entries;

        if (!entries || entries.length === 0) {
          tbody.innerHTML = `<tr><td colspan="4"><div class="loading-state">No trainers found yet. Be the first!</div></td></tr>`;
          return;
        }

        tbody.innerHTML = entries.map((user) => {
          // Use the rank provided directly by the backend
          const rankClass = user.rank <= 3 ? `rank-${user.rank}` : '';

          const username = user.username || 'Unknown Trainer';
          const petName = user.pet_name || 'Egg';
          const petLevel = user.pet_level || 1;
          const xp = Math.round(user.xp || 0);

          // Highlight the row if it's the current user
          const rowStyle = user.is_current_user ? 'background: #fdfcff; border-left: 4px solid var(--purple);' : '';

          return `
            <tr class="leaderboard-row ${rankClass}" style="${rowStyle}">
              <td class="center">
                <span class="rank-badge">${user.rank}</span>
              </td>
              <td>
                <div class="user-info">
                  <div class="user-avatar">${username.charAt(0).toUpperCase()}</div>
                  <div>
                    <div style="font-size: 16px; font-weight: 700;">
                      ${username} ${user.is_current_user ? '(You)' : ''}
                    </div>
                    <div style="font-size: 12px; color: var(--muted); margin-top: 4px;">Pet: ${petName}</div>
                  </div>
                </div>
              </td>
              <td class="center">
                <span style="font-family: 'Press Start 2P', cursive; font-size: 10px; color: var(--purple);">Lv.${petLevel}</span>
              </td>
              <td class="center">
                <div class="stat-pill xp">✨ ${xp} XP</div>
              </td>
            </tr>
          `;
        }).join('');

      } catch (error) {
        console.error(error);
        tbody.innerHTML = `<tr><td colspan="4"><div class="error-state">⚠️ Unable to load the leaderboard at this time.</div></td></tr>`;
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      loadUserInfo();
      loadLeaderboard();
    });
  </script>
</body>
</html>
