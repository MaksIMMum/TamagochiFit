<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard - TamagochiFit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
  <script src="/static/js/auth.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --bg: #eae6f0;
      --surface: #f2f0f7;
      --card: #e8e2f5;
      --purple: #7b55b8;
      --purple-dark: #5b2dd6;
      --purple-light: #a070e0;
      --text: #2a1a50;
      --muted: #a898cc;
      --accent: #ffd93d;
      --cream: #fff8e1;
      --pink: #e05c7a;
      --gold:   #ffd700;
      --silver: #c0c0c0;
      --bronze: #cd7f32;
    }

    body { font-family:'Pixelify Sans',sans-serif; background:var(--bg); min-height:100vh; display:flex; flex-direction:column; }

    /* ── Pixel Bar ── */
    .pixel-bar {
      height:8px; width:100%; display:block;
      background-image: repeating-linear-gradient(
        90deg,
        var(--purple-dark)  0px,  var(--purple-dark)  10px,
        var(--purple-light) 10px, var(--purple-light) 20px,
        var(--accent)       20px, var(--accent)       28px,
        var(--cream)        28px, var(--cream)        36px,
        var(--pink)         36px, var(--pink)         44px,
        var(--purple-light) 44px, var(--purple-light) 54px
      );
    }

    /* ── Navbar ── */
    .navbar { background:var(--surface); border-bottom:3px solid var(--card); padding:0 30px; box-shadow:0 2px 10px rgba(123,85,184,.08); position:sticky; top:0; z-index:100; }
    .nav-content { max-width:1200px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; height:64px; }
    .nav-logo { font-family:'Press Start 2P',cursive; font-size:16px; color:var(--text); text-decoration:none; }
    .nav-logo span { color:var(--purple); }
    .nav-links { display:flex; gap:4px; list-style:none; }
    .nav-links a { display:flex; align-items:center; gap:5px; padding:9px 14px; border-radius:12px; text-decoration:none; font-size:13px; font-weight:600; color:var(--muted); transition:all .2s; }
    .nav-links a:hover  { background:var(--card); color:var(--text); }
    .nav-links a.active { background:var(--purple); color:white; }
    .nav-user { display:flex; align-items:center; gap:10px; font-size:14px; font-weight:600; color:var(--text); }
    .nav-avatar { width:36px; height:36px; background:var(--purple); border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:700; }
    .hamburger { display:none; flex-direction:column; gap:5px; cursor:pointer; padding:6px; background:none; border:none; }
    .hamburger span { display:block; width:24px; height:3px; background:var(--text); border-radius:2px; }
    .mobile-menu { display:none; flex-direction:column; background:var(--surface); border-bottom:3px solid var(--card); padding:12px 20px 16px; gap:6px; position:sticky; top:64px; z-index:99; }
    .mobile-menu.open { display:flex; }
    .mobile-menu a { display:flex; align-items:center; gap:8px; padding:12px 16px; border-radius:12px; text-decoration:none; font-size:15px; font-weight:700; color:var(--muted); }
    .mobile-menu a:hover  { background:var(--card); color:var(--text); }
    .mobile-menu a.active { background:var(--purple); color:white; }

    /* ── Main ── */
    .main-content { flex:1; max-width:900px; width:100%; margin:0 auto; padding:30px 20px 40px; }

    .page-header { text-align:center; margin-bottom:14px; }
    .page-title  { font-family:'Press Start 2P',cursive; font-size:32px; color:var(--text); margin-bottom:10px; }
    .page-subtitle { font-size:16px; color:var(--muted); font-weight:600; }

    /* Centered pixel bar under page header */
    .header-pixel-bar {
      height: 6px;
      max-width: 400px;
      margin: 16px auto 36px;
      border-radius: 3px;
      background-image: repeating-linear-gradient(
        90deg,
        var(--gold)   0px,  var(--gold)   12px,
        var(--silver) 12px, var(--silver) 22px,
        var(--bronze) 22px, var(--bronze) 30px,
        var(--accent) 30px, var(--accent) 40px,
        var(--purple-light) 40px, var(--purple-light) 50px
      );
    }

    /* ── Podium ── */
    .podium { display:flex; align-items:flex-end; justify-content:center; gap:20px; margin-bottom:50px; padding:0 20px; }
    .podium-place { display:flex; flex-direction:column; align-items:center; flex:1; max-width:200px; }
    .podium-place.second { order:1; }
    .podium-place.first  { order:2; }
    .podium-place.third  { order:3; }

    .podium-avatar {
      width:100px; height:100px;
      background:linear-gradient(135deg, var(--purple-dark) 0%, var(--purple-light) 100%);
      border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-size:48px; color:white; font-weight:700;
      margin-bottom:15px;
      box-shadow:0 8px 30px rgba(123,85,184,.3);
      position:relative;
    }

    .podium-place.first .podium-avatar { width:120px; height:120px; font-size:56px; }

    .podium-crown { position:absolute; top:-25px; font-size:38px; animation:float 2s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

    .podium-name { font-size:16px; font-weight:700; color:var(--text); margin-bottom:5px; text-align:center; }
    .podium-pet  { font-size:14px; color:var(--muted); margin-bottom:10px; }

    .podium-stand { background:var(--surface); border:3px solid var(--card); border-radius:15px 15px 0 0; padding:20px 15px; width:100%; text-align:center; }
    .podium-place.first  .podium-stand { height:140px; border-color:var(--gold);   background:linear-gradient(180deg,rgba(255,215,0,.1) 0%,var(--surface) 100%); }
    .podium-place.second .podium-stand { height:110px; border-color:var(--silver); }
    .podium-place.third  .podium-stand { height:80px;  border-color:var(--bronze); }

    .podium-rank { font-size:28px; font-weight:700; margin-bottom:8px; }
    .podium-place.first  .podium-rank { color:var(--gold); }
    .podium-place.second .podium-rank { color:var(--silver); }
    .podium-place.third  .podium-rank { color:var(--bronze); }

    .podium-xp { font-size:14px; color:var(--muted); font-weight:600; }

    /* ── Rankings List ── */
    .leaderboard-card {
      background: var(--surface);
      border-radius: 25px;
      padding: 30px;
      box-shadow: 0 4px 20px rgba(123,85,184,.1);
      border: 3px solid var(--card);
      position: relative;
      overflow: hidden;
    }

    /* pixel bar on top of leaderboard card */
    .leaderboard-card > .pixel-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      border-radius: 22px 22px 0 0;
      margin: 0;
    }

    .leaderboard-title { font-size:20px; font-weight:700; color:var(--text); margin-bottom:20px; margin-top:14px; display:flex; align-items:center; gap:10px; }

    .leaderboard-list { display:flex; flex-direction:column; gap:12px; }

    .leaderboard-item {
      background: white;
      border-radius: 15px;
      padding: 20px;
      border: 3px solid var(--card);
      display: flex;
      align-items: center;
      gap: 20px;
      transition: all .2s ease;
    }
    .leaderboard-item:hover { border-color:var(--purple-light); transform:translateX(4px); }
    .leaderboard-item.me {
      border-color: var(--purple);
      background: linear-gradient(90deg, rgba(123,85,184,.05) 0%, white 100%);
    }

    .item-rank { font-size:24px; font-weight:700; color:var(--text); width:50px; text-align:center; flex-shrink:0; }
    .item-avatar { width:50px; height:50px; background:var(--purple-light); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:24px; color:white; font-weight:700; flex-shrink:0; }
    .item-info  { flex:1; min-width:0; }
    .item-name  { font-size:16px; font-weight:700; color:var(--text); margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .item-pet   { font-size:13px; color:var(--muted); font-weight:600; }
    .item-stats { display:flex; align-items:center; gap:15px; flex-shrink:0; }
    .stat-badge { background:var(--card); padding:8px 15px; border-radius:10px; font-size:14px; font-weight:700; color:var(--text); display:flex; align-items:center; gap:6px; }

    .loading { text-align:center; padding:40px; color:var(--muted); font-size:16px; }

    @media (max-width:768px) {
      .podium { flex-direction:column; gap:30px; }
      .podium-place { max-width:100%; order:initial !important; }
      .podium-place.first .podium-stand,
      .podium-place.second .podium-stand,
      .podium-place.third .podium-stand { height:auto; }
      .leaderboard-item { flex-wrap:wrap; }
      .item-stats { width:100%; justify-content:space-between; margin-top:10px; }
    }

    @media (max-width:640px) {
      .nav-links { display:none; }
      .hamburger { display:flex; }
      .main-content { padding-bottom:80px; }
    }
  </style>
</head>
<body>

  <div class="pixel-bar"></div>

  <nav class="navbar">
    <div class="nav-content">
      <a href="/" class="nav-logo">🥚 Tamagoochi<span>Fit</span></a>
      <ul class="nav-links">
        <li><a href="/home">🏠 Home</a></li>
        <li><a href="/workouts">💪 Workouts</a></li>
        <li><a href="/meals">🍽️ Meals</a></li>
        <li><a href="/shop">🛒 Shop</a></li>
        <li><a href="/leaderboard" class="active">🏆 Leaderboard</a></li>
        <li><a href="/profile">👤 Profile</a></li>
      </ul>
      <div class="nav-user">
        <div class="nav-avatar" id="userAvatar">U</div>
        <span id="userName">User</span>
        <button class="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></button>
      </div>
    </div>
  </nav>

  <div class="mobile-menu" id="mobileMenu">
    <a href="/home">🏠 Home</a>
    <a href="/workouts">💪 Workouts</a>
    <a href="/meals">🍽️ Meals</a>
    <a href="/shop">🛒 Shop</a>
    <a href="/leaderboard" class="active">🏆 Leaderboard</a>
    <a href="/profile">👤 Profile</a>
  </div>

  <div class="main-content">
    <div class="page-header">
      <h1 class="page-title">🏆 Leaderboard</h1>
      <p class="page-subtitle">Top trainers from around the world!</p>
    </div>
    <div class="header-pixel-bar"></div>

    <!-- Top 3 Podium -->
    <div class="podium" id="podium">
      <div class="loading">Loading top trainers...</div>
    </div>

    <!-- Rest of Leaderboard -->
    <div class="leaderboard-card">
      <div class="pixel-bar"></div>
      <h2 class="leaderboard-title">📊 Rankings</h2>
      <div class="leaderboard-list" id="leaderboardList">
        <div class="loading">Loading rankings...</div>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('access_token');
    function toggleMenu() { document.getElementById('mobileMenu').classList.toggle('open'); }

    const speciesEmoji = { egg:'🥚', cracked_egg:'🥚', chick:'🐣', kitten:'🐱', cat:'😺', cool_cat:'😎' };

    async function loadLeaderboard() {
      try {
        const response = await fetch('/api/social/leaderboard?limit=20', { headers:{ 'Authorization':`Bearer ${token}` } });
        if (!response.ok) throw new Error('Failed');
        const data = await response.json();

        if (data.entries.length >= 3) displayPodium(data.entries.slice(0, 3));
        displayLeaderboardList(data.entries.slice(3), data.current_user_rank);
      } catch(e) {
        document.getElementById('podium').innerHTML = '<div class="loading">Failed to load leaderboard</div>';
        document.getElementById('leaderboardList').innerHTML = '<div class="loading">Failed to load rankings</div>';
      }
    }

    function displayPodium(topThree) {
      document.getElementById('podium').innerHTML = topThree.map((entry, i) => {
        const place = ['first','second','third'][i];
        return `
          <div class="podium-place ${place}">
            <div class="podium-avatar">
              ${i === 0 ? '<div class="podium-crown">👑</div>' : ''}
              ${entry.username.charAt(0).toUpperCase()}
            </div>
            <div class="podium-name">${entry.username}</div>
            <div class="podium-pet">${speciesEmoji[entry.pet_species]||'🥚'} ${entry.pet_name}</div>
            <div class="podium-stand">
              <div class="podium-rank">#${entry.rank}</div>
              <div class="podium-xp">Level ${entry.pet_level}<br>${Math.floor(entry.xp)} XP</div>
            </div>
          </div>`;
      }).join('');
    }

    function displayLeaderboardList(entries) {
      const list = document.getElementById('leaderboardList');
      if (!entries.length) { list.innerHTML = '<div class="loading">No more entries</div>'; return; }
      list.innerHTML = entries.map(entry => `
        <div class="leaderboard-item ${entry.is_current_user ? 'me' : ''}">
          <div class="item-rank">#${entry.rank}</div>
          <div class="item-avatar">${entry.username.charAt(0).toUpperCase()}</div>
          <div class="item-info">
            <div class="item-name">${entry.username}${entry.is_current_user ? ' (You)' : ''}</div>
            <div class="item-pet">${speciesEmoji[entry.pet_species]||'🥚'} ${entry.pet_name}</div>
          </div>
          <div class="item-stats">
            <div class="stat-badge">⭐ Lvl ${entry.pet_level}</div>
            <div class="stat-badge">💪 ${Math.floor(entry.xp)} XP</div>
          </div>
        </div>`).join('');
    }

    async function loadUserInfo() {
      try {
        const r = await fetch('/api/auth/me', { headers:{ 'Authorization':`Bearer ${token}` } });
        if (r.ok) { const u = await r.json(); document.getElementById('userName').textContent = u.username; document.getElementById('userAvatar').textContent = u.username.charAt(0).toUpperCase(); }
      } catch(e) {}
    }

    window.addEventListener('DOMContentLoaded', () => {
      loadUserInfo();
      loadLeaderboard();
      setInterval(loadLeaderboard, 30000);
    });
  </script>
</body>
</html>
