<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard - TamagochiFit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../static/css/leaderboard.css">

  <script src="/static/js/auth.js"></script>

</head>
<body>

  <div class="pixel-bar"></div>

  <nav class="navbar">
    <div class="nav-content">
      <a href="/" class="nav-logo">🥚 Tamagochi<span>Fit</span></a>
      <ul class="nav-links">
        <li><a href="/home">🏠 Home</a></li>
        <li><a href="/workouts">💪 Workouts</a></li>
        <li><a href="/meals">🍽️ Meals</a></li>
        <li><a href="/shop">🛒 Shop</a></li>
        <li><a href="/leaderboard" class="active">🏆 Leaderboard</a></li>
        <li><a href="/profile">👤 Profile</a></li>
      </ul>
      <div class="nav-user">
        <div class="nav-avatar" id="userAvatar">U</div>
        <span id="userName">User</span>
      </div>
    </div>
  </nav>

  <div class="main-content">
    <div class="page-header">
      <h1 class="page-title">Hall of Fame</h1>
      <p class="page-subtitle">The most dedicated trainers and their pets.</p>
    </div>

    <div class="leaderboard-card">
      <table class="leaderboard-table">
        <thead>
          <tr>
            <th class="center" width="80">Rank</th>
            <th>Trainer & Pet</th>
            <th class="center">Pet Level</th>
            <th class="center">XP / Score</th>
          </tr>
        </thead>
        <tbody id="leaderboardBody">
          <tr>
            <td colspan="4">
              <div class="loading-state">⏳ Loading rankings...</div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="../static/js/leaderboard.js"></script>
</body>
</html>
