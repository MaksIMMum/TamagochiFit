<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TomogachiFit Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/styles.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

    <div class="login-card p-4 text-center shadow-lg" style="max-width: 400px;">
        <h1 class="pixel-font text-warning mb-3">LOGIN</h1>

        <div class="mb-4">
            <img src="../static/images/cosmetics/egg.png" alt="Pixel Egg" width="120" class="pixel-art">
        </div>

        <div id="message-container"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="mb-3 text-start">
                <label class="form-label pixel-font small">Username or Email</label>
                <input
                    type="text"
                    id="username"
                    class="form-control custom-input"
                    placeholder="Enter username or email"
                    required
                >
            </div>

            <div class="mb-3 text-start">
                <label class="form-label pixel-font small">Password</label>
                <input
                    type="password"
                    id="password"
                    class="form-control custom-input"
                    placeholder="Enter password"
                    required
                >
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <span class="small pixel-font">Not a Member?</span>
                <button type="button" class="btn btn-sm btn-warning pixel-font" onclick="goToRegister()">
                    SignUp
                </button>
            </div>

            <button type="submit" class="btn btn-warning rounded-circle p-3 shadow border-dark">
                >
            </button>
        </form>
    </div>

    <script>
        async function handleLogin(event) {
            event.preventDefault();

            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            const messageContainer = document.getElementById("message-container");

            try {
                const response = await fetch("/api/auth/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    messageContainer.innerHTML = `
                        <div class="alert alert-danger" role="alert">
                            ${error.detail || "Login failed"}
                        </div>
                    `;
                    return;
                }

                const data = await response.json();

                // Store tokens in localStorage
                localStorage.setItem("access_token", data.access_token);
                localStorage.setItem("refresh_token", data.refresh_token);
                localStorage.setItem("token_type", data.token_type);

                // Redirect to dashboard
                messageContainer.innerHTML = `
                    <div class="alert alert-success" role="alert">
                        Login successful! Redirecting...
                    </div>
                `;

                setTimeout(() => {
                    window.location.href = "/dashboard";
                }, 1500);

            } catch (error) {
                messageContainer.innerHTML = `
                    <div class="alert alert-danger" role="alert">
                        ${error.message}
                    </div>
                `;
            }
        }

        function goToRegister() {
            window.location.href = "/register";
        }
    </script>
</body>
</html>
