<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TomogachiFit Login</title>
    <link rel="stylesheet" href="/static/css/style_login_page.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
<div class="wrapper">
  <div class="card">
    <div class="card-header">
      <div class="icon-box"><img class="image" src="/static/images/cosmetics/egg2.png" alt="Tamagochi egg illustration" /></div>
      <h2>LOGIN</h2>
      <p>Log in to continue</p>
    </div>

    <div id="message-container"></div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="input-group">
        <label for="username">UserName or Gmail</label>
        <input type="text" id="username" placeholder="put here" required>
      </div>
      <div class="input-group">
        <label for="password">Password</label>
        <input
                    type="password"
                    id="password"
                    class="form-control custom-input"
                    placeholder="Enter password"
                    required
        >
      </div>
      <div class="member-group">
        <p class="question">Not a member?</p>
        <button type="button" class="first_button" onclick="goToRegister()">Sign Up</button>
      </div>
      <button type="submit" class="second_button">Continue</button>
    </form>
  </div>
</div>

<script src="/static/js/login.js"></script>
</body>
</html>
