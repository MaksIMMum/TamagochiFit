<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TomogachiFit Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/styles.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

    <div class="login-card p-4 text-center shadow-lg">
        <h1 class="pixel-font text-warning mb-3 header-shadow">LOGIN</h1>

        <div class="mb-4">
            <img src="{{ url_for('static', path='app\static\images\cosmetics\egg.png') }}"
                 alt="Pixel Egg" width="120" class="pixel-art">
        </div>

        {% if message %}
            <div class="alert alert-{{ msg_type }} pixel-font small" role="alert">
                {{ message }}
            </div>
        {% endif %}

        <form action="/login" method="post">
            <div class="mb-3 text-start">
                <label class="form-label pixel-font small text-dark">UserName</label>
                <input type="text" name="username" class="form-control custom-input" placeholder="Enter UserName" required>
            </div>

            <div class="mb-3 text-start">
                <label class="form-label pixel-font small text-dark">Password</label>
                <input type="password" name="password" class="form-control custom-input" placeholder="Enter Password" required>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <span class="small pixel-font text-muted">Not a Member?</span>
                <button type="button" class="btn btn-sm btn-warning pixel-font">SignUp</button>
            </div>

            <button type="submit" class="btn btn-warning rounded-circle p-3 shadow border-dark">
                ➝
            </button>
        </form>
    </div>
</body>
</html>
