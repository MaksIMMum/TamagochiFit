<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - TamagochiFit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --purple-dark: #5b2dd6;
      --purple-mid: #7b55b8;
      --purple-light: #a070e0;
      --purple-ultra-light: #ddd0f5;
      --pink: #e05c7a;
      --yellow: #ffd93d;
      --cream: #fff5e1;
      --text-dark: #2a1a50;
      --shadow: rgba(91, 45, 214, 0.15);
    }

    body {
      font-family: 'Pixelify Sans', sans-serif;
      background: linear-gradient(135deg, #f3e8ff 0%, #fefce8 50%, #faf5ff 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      background: white;
      border-radius: 30px;
      box-shadow: 0 20px 60px var(--shadow);
      max-width: 450px;
      width: 100%;
      padding: 40px;
      border: 4px solid var(--purple-ultra-light);
      position: relative;
      overflow: hidden;
    }

    .login-container::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(123, 85, 184, 0.05) 0%, transparent 70%);
      animation: rotate 20s linear infinite;
    }

    @keyframes rotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .content {
      position: relative;
      z-index: 1;
    }

    .logo-section {
      text-align: center;
      margin-bottom: 35px;
    }

    .mascot {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--purple-light) 0%, var(--purple-mid) 100%);
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      margin-bottom: 15px;
      box-shadow: 0 8px 20px rgba(123, 85, 184, 0.3);
      animation: bounce 2s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .logo-section h1 {
      font-family: 'Press Start 2P', cursive;
      font-size: 24px;
      color: var(--purple-dark);
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .logo-section p {
      color: var(--purple-mid);
      font-size: 14px;
      font-weight: 500;
    }

    .alert {
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 20px;
      font-size: 14px;
      font-weight: 500;
      display: none;
    }

    .alert-success {
      background: #d1f4e0;
      color: #0d5c2c;
      border: 2px solid #0d5c2c;
    }

    .alert-danger {
      background: #ffe0e6;
      color: #c41e3a;
      border: 2px solid #c41e3a;
    }

    .form-group {
      margin-bottom: 25px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: var(--text-dark);
      font-weight: 600;
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 14px 18px;
      border: 3px solid var(--purple-ultra-light);
      border-radius: 12px;
      font-family: 'Pixelify Sans', sans-serif;
      font-size: 15px;
      color: var(--text-dark);
      background: #fafafa;
      transition: all 0.3s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--purple-mid);
      background: white;
      box-shadow: 0 0 0 4px rgba(123, 85, 184, 0.1);
    }

    .form-group input::placeholder {
      color: #b0a3cc;
    }

    .submit-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--purple-dark) 0%, var(--purple-mid) 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'Pixelify Sans', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(91, 45, 214, 0.3);
      margin-bottom: 20px;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(91, 45, 214, 0.4);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .divider {
      text-align: center;
      margin: 25px 0;
      position: relative;
    }

    .divider::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--purple-ultra-light);
    }

    .divider span {
      background: white;
      padding: 0 15px;
      color: var(--purple-mid);
      font-size: 13px;
      font-weight: 600;
      position: relative;
      z-index: 1;
    }

    .signup-link {
      text-align: center;
    }

    .signup-link p {
      color: var(--purple-mid);
      font-size: 14px;
      margin-bottom: 12px;
    }

    .signup-btn {
      display: inline-block;
      padding: 12px 30px;
      background: var(--purple-ultra-light);
      color: var(--purple-dark);
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      transition: all 0.3s ease;
    }

    .signup-btn:hover {
      background: var(--purple-light);
      color: white;
      transform: translateY(-2px);
    }

    @media (max-width: 480px) {
      .login-container {
        padding: 30px 25px;
      }

      .logo-section h1 {
        font-size: 20px;
      }

      .mascot {
        width: 70px;
        height: 70px;
        font-size: 40px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="content">
      <div class="logo-section">
        <div class="mascot">🥚</div>
        <h1>Welcome Back!</h1>
        <p>Login to continue your journey</p>
      </div>

      <div id="message-container"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username or Email</label>
          <input 
            type="text" 
            id="username" 
            placeholder="Enter your username"
            required
          >
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            placeholder="Enter your password"
            required
          >
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
          Login
        </button>
      </form>

      <div class="divider">
        <span>Don't have an account?</span>
      </div>

      <div class="signup-link">
        <a href="/register" class="signup-btn">Create Account</a>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submitBtn');
    const messageContainer = document.getElementById('message-container');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      submitBtn.disabled = true;
      submitBtn.textContent = 'Logging in...';
      messageContainer.innerHTML = '';

      try {
        // Login request
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.detail || 'Login failed');
        }

        const data = await response.json();

        // Store tokens
        localStorage.setItem('access_token', data.access_token);
        localStorage.setItem('refresh_token', data.refresh_token);
        localStorage.setItem('token_type', data.token_type);

        messageContainer.innerHTML = `
          <div class="alert alert-success" style="display: block;">
            ✓ Login successful! Redirecting...
          </div>
        `;

        // Check if user has a pet
        const petResponse = await fetch('/api/pet/me', {
          headers: { 'Authorization': `Bearer ${data.access_token}` }
        });

        setTimeout(() => {
          if (petResponse.ok) {
            window.location.href = '/home';
          } else {
            window.location.href = '/hatch';
          }
        }, 1000);

      } catch (error) {
        messageContainer.innerHTML = `
          <div class="alert alert-danger" style="display: block;">
            ✗ ${error.message}
          </div>
        `;
        submitBtn.disabled = false;
        submitBtn.textContent = 'Login';
      }
    });
  </script>
</body>
</html>
