<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - TamagochiFit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../static/css/login.css">


</head>
<body>
  <div class="login-container">
    <div class="content">
      <div class="logo-section">
        <div class="mascot">🥚</div>
        <h1>Welcome Back!</h1>
        <p>Login to continue your journey</p>
      </div>

      <div id="message-container"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username or Email</label>
          <input
            type="text"
            id="username"
            placeholder="Enter your username"
            required
          >
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            placeholder="Enter your password"
            required
          >
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
          Login
        </button>
      </form>

      <div class="divider">
        <span>Don't have an account?</span>
      </div>

      <div class="signup-link">
        <a href="/register" class="signup-btn">Create Account</a>
      </div>
    </div>
  </div>

  <script src="../static/js/login.js"></script>
</body>
</html>
