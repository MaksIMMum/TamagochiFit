<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
    <link rel="stylesheet" href="../static/css/style_reg_page.css">
    <!-- шрифт  Press Start 2P-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

<div class="wrapper">
  <div class="card">

    <div class="card-header">
      <div class="icon-box"><img class="image" src="../static/images/cosmetics/egg2.png" alt="Tamagochi egg illustration" /></div>
      <h2>Registration</h2>
      <p>Create an account to start</p>
    </div>

    <form id="registerForm">

      <div class="input-group">
        <label for="name">UserName</label>
        <input type="text" id="name" placeholder="UserName" required>
      </div>

      <div class="input-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="your@gmail.com" required>
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="Password" placeholder="••••••••" required>
      </div>

      <button type="submit">SignUp</button>

    </form>

  </div>
</div>

</body>
</html>
