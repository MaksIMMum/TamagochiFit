<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - TamagochiFit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../static/css/register.css">


</head>
<body>
  <div class="register-container">
    <div class="content">
      <div class="logo-section">
        <div class="mascot">🌟</div>
        <h1>Join Us!</h1>
        <p>Start your fitness journey today</p>
      </div>

      <div id="message-container"></div>

      <form id="registerForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            placeholder="Choose a unique username"
            minlength="3"
            maxlength="50"
            required
          >
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            placeholder="your@email.com"
            required
          >
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            placeholder="Create a strong password"
            minlength="8"
            maxlength="100"
            required
          >
          <p class="password-hint">Must be at least 8 characters</p>
        </div>

        <div class="form-group">
          <label for="fullName">Full Name <span class="optional">(Optional)</span></label>
          <input
            type="text"
            id="fullName"
            placeholder="Your full name"
            maxlength="200"
          >
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
          Create Account
        </button>
      </form>

      <div class="divider">
        <span>Already have an account?</span>
      </div>

      <div class="login-link">
        <a href="/login" class="login-btn">Login Here</a>
      </div>
    </div>
  </div>

  <script src="../static/js/register.js"></script>
</body>
</html>
