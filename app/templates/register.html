<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TomogachiFit Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/styles.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

    <div class="register-card p-4 text-center shadow-lg" style="max-width: 400px;">
        <h1 class="pixel-font text-warning mb-3">REGISTER</h1>

        <div class="mb-4">
            <img src="../static/images/cosmetics/egg.png" alt="Pixel Egg" width="120" class="pixel-art">
        </div>

        <div id="message-container"></div>

        <form id="registerForm" onsubmit="handleRegister(event)">
            <div class="mb-3 text-start">
                <label class="form-label pixel-font small">Username</label>
                <input
                    type="text"
                    id="username"
                    class="form-control custom-input"
                    placeholder="3-50 characters"
                    minlength="3"
                    maxlength="50"
                    required
                >
            </div>

            <div class="mb-3 text-start">
                <label class="form-label pixel-font small">Email</label>
                <input
                    type="email"
                    id="email"
                    class="form-control custom-input"
                    placeholder="your@email.com"
                    required
                >
            </div>

            <div class="mb-3 text-start">
                <label class="form-label pixel-font small">Password</label>
                <input
                    type="password"
                    id="password"
                    class="form-control custom-input"
                    placeholder="At least 8 characters"
                    minlength="8"
                    required
                >
            </div>

            <div class="mb-3 text-start">
                <label class="form-label pixel-font small">Full Name (Optional)</label>
                <input
                    type="text"
                    id="fullName"
                    class="form-control custom-input"
                    placeholder="Your full name"
                    maxlength="200"
                >
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <span class="small pixel-font">Already a Member?</span>
                <button type="button" class="btn btn-sm btn-warning pixel-font" onclick="goToLogin()">
                    Login
                </button>
            </div>

            <button type="submit" class="btn btn-warning rounded-circle p-3 shadow border-dark">
                >
            </button>
        </form>
    </div>

    <script src="../static/js/register.js">
    </script>
</body>
</html>
