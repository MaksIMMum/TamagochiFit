<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TomogachiFit Registration</title>
  <link rel="stylesheet" href="/static/css/style_reg_page.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
<div class="wrapper">
  <div class="card">
    <div class="card-header">
      <div class="icon-box"><img class="image" src="/static/images/cosmetics/egg2.png" alt="Tamagochi egg illustration" /></div>
      <h2>Registration</h2>
      <p>Create an account to start</p>
    </div>

    <div id="message-container"></div>

    <form id="registerForm" onsubmit="handleRegister(event)">
      <div class="input-group">
        <label for="username">UserName</label>
        <input type="text" id="username" placeholder="UserName" minlength="3" maxlength="50" required>
      </div>
      <div class="input-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="your@gmail.com" required>
      </div>
      <div class="input-group">
        <label for="password">Password</label>
        <input
                    type="password"
                    id="password"
                    class="form-control custom-input"
                    placeholder="At least 8 characters"
                    minlength="8"
                    required
                >
      </div>
      <div class="input-group">
        <label for="fullName">Full Name (Optional)</label>
        <input type="text" id="fullName" placeholder="Your full name" maxlength="200">
      </div>
      <div class="member-group">
        <p class="question">Already a member?</p>
        <button type="button" class="first_button" onclick="goToLogin()">Login</button>
      </div>
      <button type="submit" class="second_button">SignUp</button>
    </form>
  </div>
</div>

<script src="/static/js/register.js"></script>
</body>
</html>
